version: '3.8'

services:
  backend:
    build:
      context: ./backend/code-learn-back
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend/code-learn-back:/app
    env_file:
      - ./backend/code-learn-back/.env

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    # volumes:
    #   - ./frontend:/app
    #   - /app/node_modules
    tty: true
    stdin_open: true
    depends_on:
      - backend